name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check / Lint
      run: npm run lint

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

  deploy-production:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CARTOLAFC_485703 }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy to Cloud Run
      run: |
        gcloud run deploy ecopulseapp \
          --source . \
          --region us-central1 \
          --project ${{ secrets.GCP_PROJECT_ID }} \
          --platform managed \
          --allow-unauthenticated \
          --port 3000 \
          --set-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

    - name: Deploy to Firebase Hosting (Live)
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: "${{ secrets.GITHUB_TOKEN }}"
        firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_CARTOLAFC_485703 }}"
        projectId: ${{ secrets.GCP_PROJECT_ID }}
        channelId: live

  deploy-preview:
    name: Deploy Preview to Firebase
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Deploy to Firebase Hosting (Preview)
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: '${{ secrets.GITHUB_TOKEN }}'
        firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CARTOLAFC_485703 }}'
        projectId: ${{ secrets.GCP_PROJECT_ID }}
      
    - name: Comment PR with Preview URL
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const fs = require('fs');
          const firebaseOutput = JSON.parse(fs.readFileSync('firebase-debug.log', 'utf8') || '{}');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Firebase preview deployed! Check the link in the Actions tab.'
          });

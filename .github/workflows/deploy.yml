name: Build and Deploy to Cloud Run & Firebase

on:
  push:
    branches:
      - main  # Adjust this to your branch name (e.g., master)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and Push Container
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/ecopulseapp .
          
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ecopulseapp \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/ecopulseapp \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.GCP_SA_KEY }}"
          projectId: cartolafc-485703
          channelId: live
